    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p');

        body {
            margin: 0; padding: 0;
            font-family: "M PLUS 1p", sans-serif;
            background-color: lightgrey;
            header {
                text-align: center;
                margin: 0; padding: 30px;
                background: linear-gradient(to bottom right, crimson 49.8%, black 50.2%);
                color: white; text-shadow: 3px 3px 1px darkred;
                background-color: black;
                font-size: 30px;
            }
            main {
                padding: 50px;
                font-size: 20px;
              
                ol {
                    font-size: 25px;
                    padding-left: 10px; 
                    ol {
                        font-size: 22px;
                    }
                    li {
                        a {
                            color: darkred;
                            text-decoration: none;
                            &:hover {
                                text-decoration: underline; 
                            }
                        }
                        pre {
                            font-size: 18px;
                            text-wrap-mode: wrap;
                            border-left: solid 1px grey;
                            padding: 10px;
                        }
                    }
                }
            }
            footer {
                background-color: darkgray;
                padding: 50px;
            }
        }
    </style>

    <script>
        async function main() {
            for (a of document.querySelectorAll("a")) {
                let txt = document.createElement("pre");
                let data = await (await fetch(a.href)).text();
                let lines = data.split('\n');

                txt.innerText = lines.slice(2).join('\n');
                a.parentElement.appendChild(txt)
                a.innerHTML = lines[0];
            }
        }

        main()
    </script>
