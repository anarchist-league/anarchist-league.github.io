    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+1p');

        body {
            margin: 0; padding: 0;
            font-family: "M PLUS 1p", sans-serif;
            background-color: lightgrey;
            header {
                text-align: center;
                margin: 0; padding: 30px;
                background: linear-gradient(to bottom right, crimson 49.8%, black 50.2%);
                color: white; text-shadow: 3px 3px 1px darkred;
                background-color: black;
                font-size: 30px;
            }
            main {
                padding: 5vw;
                font-size: 20px;
                ol {
                    font-size: 25px;
                    padding-left: 2vw; 
                    list-style: none;
                    h3 {
                        padding: 1vw;
                        font-weight: normal;
                        border-bottom: solid 2px transparent;
                        border-image: linear-gradient(to right, red, black) 2;
                    }
                    ol {
                        font-size: 22px;
                    }
                    li {
                        div {
                            text-wrap-mode: wrap;
                            border-left: solid 1px grey;
                            padding: 1vw; margin: 1vw;
                            padding-top: 0; padding-bottom: 0;
                            p {
                                font-size: 18px;

                                & + & {

                            }
                        }
                    }

            }
            footer {
                background-color: darkgray;
                padding: 50px;
            }
            a {
                color: darkred;
                text-decoration: none;
                &:hover {
                    text-decoration: underline; 
                }
            }
            ::selection {
                background-color: #11223388;
                color: white;
            }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function main() {
            for (a of document.querySelectorAll("a")) {
                let txt = document.createElement("div");
                let data = await (await fetch(a.href)).text();
                let lines = data.split('\n');

                marked.use({ breaks: true, gfm: true });
                data = lines.slice(1).join('\n').trim();
                txt.innerHTML = marked.parse(data);

                a.parentElement.appendChild(txt)
                a.innerHTML = lines[0];
            }
        }

        main()
    </script>
